version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: etax_postgres
    environment:
      POSTGRES_DB: etax_invoice
      POSTGRES_USER: etax_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etax_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Raw SQL migrations removed - use Prisma migrations instead
    # volumes: ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etax_user -d etax_invoice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: etax_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: etax_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://etax_user:${POSTGRES_PASSWORD:-etax_secret}@postgres:5432/etax_invoice
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-ap-southeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/fonts:/app/fonts:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: etax_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  minio:
    image: minio/minio:latest
    container_name: etax_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
