<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background gradient - brand blue -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Rounded rect background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)" />
  <!-- Shine overlay -->
  <rect width="1024" height="512" rx="200" ry="200" fill="url(#shine)" />

  <!-- Document shape -->
  <rect x="280" y="180" width="380" height="480" rx="28" ry="28"
        fill="#ffffff" fill-opacity="0.15" />
  <rect x="296" y="196" width="348" height="448" rx="20" ry="20"
        fill="#ffffff" />

  <!-- Document lines (invoice rows) -->
  <rect x="332" y="272" width="200" height="18" rx="9" fill="#1d4ed8" fill-opacity="0.7"/>
  <rect x="332" y="312" width="276" height="12" rx="6" fill="#94a3b8"/>
  <rect x="332" y="336" width="220" height="12" rx="6" fill="#94a3b8"/>
  <rect x="332" y="360" width="248" height="12" rx="6" fill="#94a3b8"/>

  <!-- Divider -->
  <rect x="332" y="392" width="280" height="2" rx="1" fill="#e2e8f0"/>

  <!-- Amount row -->
  <rect x="332" y="410" width="120" height="12" rx="6" fill="#94a3b8"/>
  <rect x="440" y="407" width="80" height="18" rx="9" fill="#1d4ed8" fill-opacity="0.8"/>

  <!-- Bottom total -->
  <rect x="332" y="445" width="140" height="12" rx="6" fill="#94a3b8"/>
  <rect x="430" y="441" width="94" height="22" rx="11" fill="#1d4ed8"/>

  <!-- Checkmark seal (bottom right of doc) -->
  <circle cx="576" cy="580" r="52" fill="#10b981"/>
  <polyline points="553,580 568,596 602,562"
            stroke="#ffffff" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Thai flag accent bar at top -->
  <rect x="296" y="196" width="348" height="36" rx="20" ry="20" fill="#1d4ed8"/>
  <rect x="296" y="196" width="348" height="18" rx="0" fill="#1d4ed8"/>

  <!-- "e-Tax" text in doc header -->
  <text x="470" y="224" font-family="Arial,sans-serif" font-size="20" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="2">e-TAX</text>

  <!-- ฿ symbol bottom center -->
  <text x="512" y="780" font-family="Arial,sans-serif" font-size="96" font-weight="bold"
        fill="#ffffff" fill-opacity="0.25" text-anchor="middle">฿</text>
</svg>
