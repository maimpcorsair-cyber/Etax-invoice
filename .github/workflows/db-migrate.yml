name: Legacy SQL DB Migration

# Manual escape hatch for one-off SQL files in database/migrations.
# Normal production schema changes should live in backend/prisma/migrations and
# run through render-deploy.yml or Manual Prisma DB Migration.

on:
  workflow_dispatch:
    inputs:
      migration:
        description: 'SQL filename in database/migrations (e.g. 016_rls_remaining_tables.sql)'
        required: true
        default: '016_rls_remaining_tables.sql'
      confirm:
        description: 'Type YES to confirm running on production'
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run migration SQL
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          MIGRATION="database/migrations/${{ github.event.inputs.migration }}"
          if [ ! -f "$MIGRATION" ]; then
            echo "❌ Migration file not found: $MIGRATION"
            echo "Use a filename from database/migrations, for example 016_rls_remaining_tables.sql"
            exit 1
          fi
          echo "📦 Running: $MIGRATION"
          psql "$DATABASE_URL" -f "$MIGRATION"
          echo "✅ Migration applied"
