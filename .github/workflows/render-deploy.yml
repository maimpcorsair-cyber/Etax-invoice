name: Deploy to Render

# Applies production Prisma migrations first, then triggers Render backend deploy.
# This keeps database shape and application code in the same release order.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'package*.json'
      - '.github/workflows/render-deploy.yml'

jobs:
  deploy:
    name: Migrate and Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify backend types
        working-directory: backend
        run: npm run typecheck

      - name: Check migration status
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate status || true

      - name: Apply production migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Trigger deploy hook
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          DEPLOY_MODE="hook"
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            DEPLOY_MODE="api"
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}')
          else
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "$RENDER_DEPLOY_HOOK_URL")
          fi
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id // .deploy.id // .deployId // .data.id // empty' 2>/dev/null || echo "")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ] && [ "$STATUS" != "202" ]; then
            echo "Deploy hook failed: $STATUS"
            echo "$BODY" | jq -c '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi
          if [ "$DEPLOY_MODE" = "api" ] && [ -z "$DEPLOY_ID" ]; then
            echo "Render API did not return a deploy id; refusing to mark deploy green."
            echo "Response status: $STATUS"
            echo "Response shape:"
            echo "$BODY" | jq -c 'if type == "object" then keys else type end' 2>/dev/null || true
            echo "Response body:"
            echo "$BODY" | jq -c '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi
          echo "Deploy triggered: $DEPLOY_ID"

      - name: Wait and check deploy status
        if: steps.deploy.outputs.deploy_id != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_SERVICE_ID is not set; skipping deploy status polling"
            exit 0
          fi
          echo "Waiting for deploy $DEPLOY_ID..."
          for i in $(seq 1 20); do
            sleep 15
            RESULT=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
            STATE=$(echo "$RESULT" | jq -r '.status // .deploy.status // empty')
            echo "  Status: $STATE"
            if [ "$STATE" = "live" ]; then
              echo "Deploy live"
              exit 0
            elif [ "$STATE" = "deactivated" ] || [ "$STATE" = "build_failed" ]; then
              echo "Deploy failed: $STATE"
              exit 1
            fi
          done
          echo "Timeout waiting for deploy (5 min)"
          exit 1

      - name: Smoke check backend health
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 25 \
              https://etax-invoice-api.onrender.com/api/health || echo "000")
            echo "Backend health attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          exit 1
