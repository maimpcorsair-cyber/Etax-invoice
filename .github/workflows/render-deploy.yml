name: Deploy to Render

# Applies production Prisma migrations first, then triggers Render backend deploy.
# This keeps database shape and application code in the same release order.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/src/**'
      - 'backend/prisma/**'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - 'backend/tsconfig*.json'
      - 'backend/Dockerfile'
      - 'backend/.dockerignore'
      - 'prisma/**'
      - 'package*.json'
      - 'render.yaml'
      - '.github/workflows/render-deploy.yml'

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Migrate and Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: production-backend-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify backend types
        working-directory: backend
        run: npm run typecheck

      - name: Check migration status
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate status || true

      - name: Apply production migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Wait for Typecheck workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Typecheck workflow on $GITHUB_SHA..."
          for i in $(seq 1 60); do
            TYPECHECK_RUN=$(gh run list \
              --workflow Typecheck \
              --commit "$GITHUB_SHA" \
              --json databaseId,status,conclusion,url \
              --limit 1)
            RUN_ID=$(echo "$TYPECHECK_RUN" | jq -r '.[0].databaseId // empty')
            STATUS=$(echo "$TYPECHECK_RUN" | jq -r '.[0].status // empty')
            CONCLUSION=$(echo "$TYPECHECK_RUN" | jq -r '.[0].conclusion // empty')

            if [ -z "$RUN_ID" ]; then
              echo "  Typecheck run not visible yet (attempt $i)"
            elif [ "$STATUS" = "completed" ]; then
              echo "  Typecheck run $RUN_ID completed: $CONCLUSION"
              if [ "$CONCLUSION" = "success" ]; then
                exit 0
              fi
              echo "$TYPECHECK_RUN" | jq -c '.[0]'
              exit 1
            else
              echo "  Typecheck run $RUN_ID is $STATUS (attempt $i)"
            fi

            sleep 5
          done
          echo "Timed out waiting for Typecheck workflow"
          exit 1

      - name: Trigger deploy hook
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          DEPLOY_MODE="hook"
          TRIGGERED_AFTER=$(date -u -d "2 minutes ago" +"%Y-%m-%dT%H:%M:%SZ")
          if [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            echo "Disabling Render auto deploy for this service before manual deploy..."
            PATCH_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PATCH "https://api.render.com/v1/services/$RENDER_SERVICE_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"autoDeploy":"no"}')
            PATCH_STATUS=$(echo "$PATCH_RESPONSE" | tail -1)
            PATCH_BODY=$(echo "$PATCH_RESPONSE" | sed '$d')
            if [ "$PATCH_STATUS" != "200" ]; then
              echo "Could not disable Render auto deploy: $PATCH_STATUS"
              echo "$PATCH_BODY" | jq -c '.' 2>/dev/null || echo "$PATCH_BODY"
              exit 1
            fi
            DEPLOY_MODE="api"
            REQUEST_BODY=$(jq -nc '{clearCache:"clear"}')
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$REQUEST_BODY")
          elif [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "$RENDER_DEPLOY_HOOK_URL")
          else
            echo "Neither RENDER_DEPLOY_HOOK_URL nor Render API credentials are configured"
            exit 1
          fi
          STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          DEPLOY_ID=$(echo "$BODY" | jq -r '.id // .deploy.id // .deployId // .data.id // empty' 2>/dev/null || echo "")
          if [ -z "$DEPLOY_ID" ] && [ "$STATUS" = "202" ] && [ -n "$RENDER_API_KEY" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            echo "Deploy was queued; locating queued deploy for commit $GITHUB_SHA..."
            for i in $(seq 1 12); do
              sleep 5
              DEPLOYS=$(curl -s -G \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                --data-urlencode "createdAfter=$TRIGGERED_AFTER" \
                --data-urlencode "limit=10" \
                "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
              DEPLOY_ID=$(echo "$DEPLOYS" | jq -r --arg sha "$GITHUB_SHA" '
                map(select((.deploy.commit.id // "") == $sha or ((.deploy.commit.id // "") | startswith($sha))))[0].deploy.id
                // .[0].deploy.id
                // empty
              ' 2>/dev/null || echo "")
              if [ -n "$DEPLOY_ID" ]; then
                break
              fi
              echo "  queued deploy not visible yet (attempt $i)"
            done
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ] && [ "$STATUS" != "202" ]; then
            echo "Deploy hook failed: $STATUS"
            echo "$BODY" | jq -c '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi
          if [ "$DEPLOY_MODE" = "api" ] && [ -z "$DEPLOY_ID" ]; then
            echo "Render API did not return a deploy id; refusing to mark deploy green."
            echo "Response status: $STATUS"
            echo "Response shape:"
            echo "$BODY" | jq -c 'if type == "object" then keys else type end' 2>/dev/null || true
            echo "Response body:"
            echo "$BODY" | jq -c '.' 2>/dev/null || echo "$BODY"
            exit 1
          fi
          echo "Deploy triggered: $DEPLOY_ID"

      - name: Wait and check deploy status
        if: steps.deploy.outputs.deploy_id != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "RENDER_SERVICE_ID is not set; skipping deploy status polling"
            exit 0
          fi
          echo "Waiting for deploy $DEPLOY_ID..."
          for i in $(seq 1 80); do
            sleep 15
            RESULT=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
            STATE=$(echo "$RESULT" | jq -r '.status // .deploy.status // empty')
            FINISHED_AT=$(echo "$RESULT" | jq -r '.finishedAt // .deploy.finishedAt // empty' 2>/dev/null || echo "")
            echo "  Status: $STATE"
            if [ "$STATE" = "live" ]; then
              echo "Deploy live"
              exit 0
            elif [ "$STATE" = "deactivated" ] || [ "$STATE" = "build_failed" ]; then
              echo "Deploy failed: $STATE"
              echo "$RESULT" | jq -c '{
                status: (.status // .deploy.status // null),
                id: (.id // .deploy.id // null),
                failureReason: (.failureReason // .deploy.failureReason // .deploy.failureReasonText // null),
                finishedAt: (.finishedAt // .deploy.finishedAt // null),
                commit: (.commit // .deploy.commit // null)
              }' 2>/dev/null || echo "$RESULT"
              SERVICE=$(curl -s \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                "https://api.render.com/v1/services/$RENDER_SERVICE_ID")
              OWNER_ID=$(echo "$SERVICE" | jq -r '.ownerId // .owner.id // .service.ownerId // .service.owner.id // empty' 2>/dev/null || echo "")
            if [ -n "$OWNER_ID" ]; then
              LOG_START=$(date -u -d "20 minutes ago" +"%Y-%m-%dT%H:%M:%SZ")
              LOG_END=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              if [ -n "$FINISHED_AT" ]; then
                LOG_END="$FINISHED_AT"
              fi
              echo "Recent Render build logs:"
              curl -s -G \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                --data-urlencode "ownerId=$OWNER_ID" \
                --data-urlencode "resource=$RENDER_SERVICE_ID" \
                --data-urlencode "type=build" \
                --data-urlencode "taskRun=$DEPLOY_ID" \
                --data-urlencode "startTime=$LOG_START" \
                --data-urlencode "endTime=$LOG_END" \
                --data-urlencode "direction=forward" \
                --data-urlencode "limit=100" \
                "https://api.render.com/v1/logs" \
                | jq -r '
                  (.logs // .items // .data // .) as $logs
                  | if ($logs | type) == "array" then
                      if ($logs | length) == 0 then
                        "No build logs returned for this deploy id."
                      else
                        $logs[]
                        | [
                            (.timestamp // .time // .createdAt // ""),
                            (.message // .text // .log // .line // tostring)
                          ]
                        | @tsv
                      end
                    else
                      .
                    end
                ' 2>/dev/null || true
              else
                echo "Could not discover Render owner id for log query."
                echo "$SERVICE" | jq -c 'if type == "object" then keys else type end' 2>/dev/null || true
              fi
              exit 1
            fi
          done
          echo "Timeout waiting for deploy (20 min)"
          exit 1

      - name: Smoke check backend health
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 25 \
              https://etax-invoice-api.onrender.com/api/health || echo "000")
            echo "Backend health attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 15
          done
          exit 1
