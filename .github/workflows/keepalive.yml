name: Keep Render Backend Alive

# Pings /ping every 5 minutes so Render free-tier never cold-starts
# Free — GitHub gives 2,000 minutes/month on free plan

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes, 24/7
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://etax-invoice-api.onrender.com/ping || echo "000")
          echo "Response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is alive"
          else
            echo "⚠️ Backend returned $STATUS — may be cold-starting (not a failure)"
          fi
          exit 0
