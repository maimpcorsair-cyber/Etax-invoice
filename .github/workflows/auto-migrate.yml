name: Manual Prisma DB Migration

# Manual fallback for applying Prisma migrations without deploying the backend.
# Normal production releases migrate through render-deploy.yml before deploy.

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - resolve-rolled-back
      migration:
        description: 'Migration name for resolve-rolled-back'
        required: false
        default: '20260504_rls_remaining_tables'
      confirm:
        description: 'Type YES to confirm running Prisma migrations on production'
        required: true

jobs:
  migrate:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Resolve failed migration as rolled back
        if: ${{ github.event.inputs.operation == 'resolve-rolled-back' }}
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate resolve --rolled-back "${{ github.event.inputs.migration }}"

      - name: Run Prisma migration
        if: ${{ github.event.inputs.operation == 'deploy' }}
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Verify migration
        run: echo "Prisma migration operation completed successfully"
