name: Manual Prisma DB Migration

# Manual fallback for applying Prisma migrations without deploying the backend.
# Normal production releases migrate through render-deploy.yml before deploy.

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
      migration:
        description: 'Reserved for emergency repair workflow; not used by normal deploy'
        required: false
        default: ''
      confirm:
        description: 'Type YES to confirm running Prisma migrations on production'
        required: true

jobs:
  migrate:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: production-database-migration
      cancel-in-progress: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check migration status
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate status

      - name: Run Prisma migration
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Verify migration
        run: echo "Prisma migration operation completed successfully"
