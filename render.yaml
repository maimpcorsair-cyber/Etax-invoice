services:
  - type: web
    name: etax-invoice-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "false"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: etax-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URLS
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 420889491125-p2pgamg2kb3574o213ep0om8pn94suar.apps.googleusercontent.com
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GOOGLE_AI_OCR_MODEL
        value: gemini-2.5-flash
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_CHAT_MODEL
        value: google/gemini-2.5-flash-lite
      - key: OPENROUTER_CHAT_FALLBACK_MODEL
        value: openai/gpt-4.1-mini
      - key: AI_CHAT_TIMEOUT_MS
        value: "12000"
      - key: AI_OCR_TIMEOUT_MS
        value: "30000"
      - key: RD_ENVIRONMENT
        value: sandbox
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: ap-southeast-1
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  - type: worker
    name: etax-invoice-worker
    runtime: docker
    rootDir: backend
    plan: starter
    dockerCommand: node dist/worker.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: etax-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: RD_ENVIRONMENT
        value: sandbox
      - key: RD_CLIENT_ID
        sync: false
      - key: RD_CLIENT_SECRET
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: ap-southeast-1
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false

databases:
  - name: etax-postgres
    databaseName: etax_invoice
    user: etax_invoice
    plan: free
