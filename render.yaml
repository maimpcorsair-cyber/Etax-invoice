services:
  - type: web
    name: etax-invoice-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    # Deploy on every push to main. Sentry catches any runtime regressions
    # the Typecheck CI didn't (typecheck still runs on every push and surfaces
    # in GitHub Actions independently). `checksPass` was deadlocking: Render
    # waited on the "Deploy to Render" workflow, which only ran via manual
    # dispatch — so nothing ever auto-deployed.
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "false"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: etax-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: INTAKE_EDIT_TTL_HOURS
        value: "72"
      - key: FRONTEND_URLS
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: 420889491125-p2pgamg2kb3574o213ep0om8pn94suar.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REDIRECT_URI
        value: https://etax-invoice-api.onrender.com/api/drive/callback
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CONFIG_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: RD_VAT_DATA_URLS
        sync: false
      - key: RD_VAT_DATA_URL
        sync: false
      - key: OPEN_DBD_DATA_URL
        sync: false
      - key: MOC_JURISTIC_LOOKUP_ENABLED
        value: "false"
      - key: MOC_JURISTIC_LOOKUP_TIMEOUT_MS
        value: "1500"
      - key: GOOGLE_AI_OCR_MODEL
        value: gemini-2.5-flash
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_CHAT_MODEL
        value: google/gemini-2.5-flash-lite
      - key: OPENROUTER_CHAT_FALLBACK_MODEL
        value: openai/gpt-4.1-mini
      - key: AI_CHAT_TIMEOUT_MS
        value: "12000"
      - key: AI_OCR_TIMEOUT_MS
        value: "30000"
      - key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_KEY
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_API_VERSION
        value: "2024-11-30"
      - key: AZURE_DOCUMENT_INTELLIGENCE_MODEL_ID
        value: prebuilt-invoice
      - key: AZURE_DOCUMENT_INTELLIGENCE_TIMEOUT_MS
        value: "45000"
      - key: RD_ENVIRONMENT
        value: sandbox
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: etax-invoice-worker
    runtime: docker
    rootDir: backend
    plan: starter
    dockerCommand: node dist/worker.js
    # Deploy on every push to main. Sentry catches any runtime regressions
    # the Typecheck CI didn't (typecheck still runs on every push and surfaces
    # in GitHub Actions independently). `checksPass` was deadlocking: Render
    # waited on the "Deploy to Render" workflow, which only ran via manual
    # dispatch — so nothing ever auto-deployed.
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_WORKERS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: etax-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      # Master Sheet and Drive sync workers run in this separate Render
      # service, so Google/OAuth secrets must exist here too. API-only env vars
      # make the dashboard look configured while jobs still fail in the worker.
      - key: GOOGLE_CLIENT_ID
        value: 420889491125-p2pgamg2kb3574o213ep0om8pn94suar.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CONFIG_ENCRYPTION_KEY
        sync: false
      - key: RD_ENVIRONMENT
        value: sandbox
      - key: RD_VAT_DATA_URLS
        sync: false
      - key: RD_VAT_DATA_URL
        sync: false
      - key: OPEN_DBD_DATA_URL
        sync: false
      - key: RD_CLIENT_ID
        sync: false
      - key: RD_CLIENT_SECRET
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

databases:
  - name: etax-postgres
    databaseName: etax_invoice
    user: etax_invoice
    # 'free' Render Postgres expires after 30 days AND has no backups —
    # data-loss risk for a paying-customer SaaS. 'starter' ($7/mo) is the
    # minimum tier that gets automatic daily backups + 7-day PITR.
    # Note: changing this YAML field does NOT auto-upgrade an existing
    # Postgres instance — confirm + upgrade in the Render dashboard.
    plan: starter
